name: NarrativeOS Telegram Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:   # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install aiohttp beautifulsoup4 pandas openpyxl

      - name: Run TG Scraper
        # UPDATED: Matches your local filename
        run: python telegram_scraper_fixed.py
      
      - name: Commit and Push Data
        run: |
          git config --global user.name "NarrativeOS-Bot"
          git config --global user.email "bot@narrativeos.ai"
          
          # Sync with remote to avoid push collisions
          git stash
          git pull origin main --rebase
          git stash pop || echo "No local changes to pop"
          
          # Add the updated data and cache
          git add raw_intel.json seen_tg_links.json
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No new intelligence data found."
          else
            git commit -m "TG Intel Update: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi