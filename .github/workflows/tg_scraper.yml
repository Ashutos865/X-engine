name: NarrativeOS Telegram Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Deps
        run: pip install aiohttp beautifulsoup4 pandas openpyxl

      - name: Run TG Scraper
        run: python scrape_telegram.py

      - name: Push Data
        run: |
          git config --global user.name "NarrativeOS-Bot"
          git config --global user.email "bot@narrativeos.ai"
          git stash
          git pull origin main --rebase
          git stash pop || echo "Clean"
          git add raw_intel.json seen_tg_links.json
          git commit -m "TG Intel Update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push origin main